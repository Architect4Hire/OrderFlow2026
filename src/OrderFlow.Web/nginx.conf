server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;

    # The app is a client-side-routed SPA: /ops is a route, not a file. Without this fallback a hard
    # refresh on any route but "/" returns 404, because nginx looks for a directory that was never built.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Generated per-container by the entrypoint. Caching it would defeat the entire point of injecting
    # configuration at start-up: a client could hold a stale copy pointing at the previous deployment.
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    location ~* \.(?:js|css|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
